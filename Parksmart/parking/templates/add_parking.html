{% extends 'home.html' %}

{% block title %}Add Parking{% endblock %}

{% block content %}

<style>
.container {
    background: rgba(255, 255, 255, 0.95);
    padding: 40px;
    border-radius: 15px;
    width: 400px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #333;
}

.form-group {
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #f1f1f1;
    font-size: 14px;
}

input:focus {
    outline: none;
    background: #e0e0e0;
}

input[type="file"] {
    background: none;
}

button {
    width: 100%;
    padding: 12px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #0056b3;
}

.footer-link {
    margin-top: 15px;
    text-align: center;
    font-size: 13px;
}

.footer-link a {
    text-decoration: none;
    color: #007bff;
}
</style>

<div class="container">
    <h2>Add Parking</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-group">
            <input type="text" name="parking_name" placeholder="Parking Name" required>
        </div>

        <div class="form-group">
            <input type="text" name="location" placeholder="Location" required>
        </div>

        <div class="form-group">
            <input type="number" name="total_slots" placeholder="Total Slots" required>
        </div>

        <h3>Vehicle Slots & Pricing</h3>

        <label>Bike Slots</label>
        <input type="number" name="bike_slots">

        <label>Bike Price</label>
        <input type="number" name="bike_price">

        <label>Car Slots</label>
        <input type="number" name="car_slots">

        <label>Car Price</label>
        <input type="number" name="car_price">

        <label>SUV Slots</label>
        <input type="number" name="suv_slots">

        <label>SUV Price</label>
        <input type="number" name="suv_price">

        <label>Truck Slots</label>
        <input type="number" name="truck_slots">

        <label>Truck Price</label>
        <input type="number" name="truck_price">

        <div class="form-group">
            <input type="file" name="image">
        </div>
        
            </form>
     <button type="submit">Add Parking</button>

    <div class="footer-link">
        <a href="{% url 'parking_provider' %}">← Back to Dashboard</a>
    </div>
</div>

{% endblock %}
