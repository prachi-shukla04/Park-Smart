{% extends 'home.html' %}

{% block title %}Login - Smart Park{% endblock %}

{% block content %}

<style>
    .login-container{
        width: 100%;
        max-width: 420px;
        animation: slideUp 0.6s ease;
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(30px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .login-card{
        background: #fff;
        padding: 40px 32px;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }

    .login-icon {
        width: 64px;
        height: 64px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        margin: 0 auto 20px;
        box-shadow: 0 10px 30px rgba(102, 126, 234, 0.35);
    }

    .login-card h2{
        text-align: center;
        color: #222;
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 6px;
    }

    .login-subtitle {
        text-align: center;
        color: #999;
        font-size: 14px;
        margin-bottom: 28px;
    }

    .login-card input,
    .login-card select{
        width: 100%;
        padding: 14px 16px;
        margin: 6px 0;
        border: 1px solid #e0e0e0;
        border-radius: 12px;
        background: #f8f9fa;
        color: #333;
        font-size: 14px;
        font-family: 'Inter', sans-serif;
        transition: all 0.3s ease;
        outline: none;
    }

    .login-card input::placeholder {
        color: #aaa;
    }

    .login-card select option {
        background: #fff;
        color: #333;
    }

    .login-card input:focus,
    .login-card select:focus{
        border-color: #667eea;
        background: #fff;
        box-shadow: 0 0 0 3px rgba(102,126,234,0.12);
    }

    .login-card button{
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 16px;
        transition: all 0.3s ease;
        font-family: 'Inter', sans-serif;
        box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
    }

    .login-card button:hover{
        transform: translateY(-2px);
        box-shadow: 0 12px 35px rgba(102, 126, 234, 0.45);
    }

    .extra{
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        margin-top: 20px;
        padding-top: 16px;
        border-top: 1px solid #eee;
    }

    .extra a{
        text-decoration: none;
        color: #888;
        font-weight: 500;
        transition: color 0.3s;
    }

    .extra a:hover{
        color: #667eea;
    }
</style>

<div class="login-container">
    <div class="login-card">
        <div class="login-icon">🔐</div>
        <h2>Welcome Back</h2>
        <p class="login-subtitle">Sign in to your Smart Park account</p>

        <form method="POST">
            {% csrf_token %}

            <select name="role" required>
                <option value="">Login As</option>
                <option value="user">🚗 Parking User</option>
                <option value="provider">🏢 Parking Provider</option>
            </select>

            <input type="email" name="email" placeholder="📧 Email address" required>
            <input type="password" name="password" placeholder="🔒 Password" required>

            <button type="submit">Sign In →</button>
        </form>

        <div class="extra">
            <a href="/register">Create Account</a>
        </div>
    </div>
</div>

{% endblock %}
