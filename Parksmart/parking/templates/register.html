{% extends 'home.html' %}

{% block title %}Register - Smart Park{% endblock %}

{% block content %}

<style>
    .register-container{
        width: 100%;
        max-width: 520px;
        animation: slideUp 0.6s ease;
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(30px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .register-card{
        background: #fff;
        padding: 40px 32px;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }

    .register-icon {
        width: 64px;
        height: 64px;
        background: linear-gradient(135deg, #43e97b, #38f9d7);
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        margin: 0 auto 20px;
        box-shadow: 0 10px 30px rgba(67, 233, 123, 0.25);
    }

    .register-card h2{
        text-align: center;
        color: #222;
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 6px;
    }

    .register-subtitle {
        text-align: center;
        color: #999;
        font-size: 14px;
        margin-bottom: 28px;
    }

    .register-card input,
    .register-card select{
        width: 100%;
        padding: 14px 16px;
        margin: 6px 0;
        border: 1px solid #e0e0e0;
        border-radius: 12px;
        background: #f8f9fa;
        color: #333;
        font-size: 14px;
        font-family: 'Inter', sans-serif;
        transition: all 0.3s ease;
        outline: none;
    }

    .register-card input::placeholder { color: #aaa; }
    .register-card select option { background: #fff; color: #333; }

    .register-card input:focus,
    .register-card select:focus{
        border-color: #43e97b;
        background: #fff;
        box-shadow: 0 0 0 3px rgba(67,233,123,0.1);
    }

    .form-row{
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
    }

    .register-card button{
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #43e97b, #38f9d7);
        color: #1a1a2e;
        border: none;
        border-radius: 12px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        margin-top: 16px;
        transition: all 0.3s ease;
        font-family: 'Inter', sans-serif;
        box-shadow: 0 8px 25px rgba(67, 233, 123, 0.25);
    }

    .register-card button:hover{
        transform: translateY(-2px);
        box-shadow: 0 12px 35px rgba(67, 233, 123, 0.4);
    }

    .login-link {
        text-align: center;
        margin-top: 20px;
        padding-top: 16px;
        border-top: 1px solid #eee;
        font-size: 13px;
        color: #999;
    }

    .login-link a {
        color: #43e97b;
        text-decoration: none;
        font-weight: 600;
    }

    .login-link a:hover { color: #2ecc71; }

    .hidden{ display:none; }

    @media(max-width: 520px) {
        .form-row { grid-template-columns: 1fr; }
    }
</style>

<div class="register-container">
    <div class="register-card">
        <div class="register-icon">✨</div>
        <h2>Create Account</h2>
        <p class="register-subtitle">Join Smart Park and start parking smarter</p>

        <form method="POST" action="{% url 'register' %}">
            {% csrf_token %}

            <div class="form-row">
                <input type="text" name="name" placeholder="👤 Full Name">
                <input type="text" name="phone" placeholder="📱 Phone Number">
            </div>

            <input type="email" name="email" placeholder="📧 Email Address">
            <input type="text" name="address" placeholder="📍 Address">

            <select name="role" id="role" onchange="showFields()">
                <option value="user">🚗 Parking User</option>
                <option value="provider">🏢 Parking Provider</option>
            </select>

            <input type="password" name="password" placeholder="🔒 Create Password">

            <button type="submit">Create Account →</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="/login">Sign In</a>
        </div>
    </div>
</div>

<script>
function showFields() {
    var role = document.getElementById("role").value;
    var userFields = document.getElementById("userFields");
    var providerFields = document.getElementById("providerFields");

    if(userFields && providerFields){
        if(role === "user"){
            userFields.style.display = "block";
            providerFields.style.display = "none";
        }
        else if(role === "provider"){
            providerFields.style.display = "block";
            userFields.style.display = "none";
        }
        else{
            userFields.style.display = "none";
            providerFields.style.display = "none";
        }
    }
}
</script>

{% endblock %}
