{% extends 'home.html' %}

{% block title %}Register - Smart Park{% endblock %}

{% block content %}

<style>
    .container{
        width:800px;
        margin:40px auto;
        background:white;
        padding:30px;
        border-radius:10px;
        box-shadow:0 0 15px rgba(0,0,0,0.1);
    }

    h2{
        text-align:center;
        margin-bottom:20px;
    }

    .form-row{
        display:flex;
        gap:15px;
    }

    input, select{
        width:100%;
        padding:10px;
        margin:8px 0;
        border:1px solid #ccc;
        border-radius:5px;
    }

    button{
        width:100%;
        padding:12px;
        background:#4b154d;
        color:white;
        border:none;
        margin-top:15px;
        border-radius:5px;
        cursor:pointer;
        font-size:16px;
    }

    button:hover{
        background:#6b1f6f;
    }

    .hidden{
        display:none;
    }
</style>

<!-- Registration Form -->
<div class="container">
    <h2>Smart Park Registration</h2>

    <form method="POST" action="{% url 'register' %}">
        {% csrf_token %}

        <input type="text" name="name" placeholder="Name">
        <input type="email" name="email" placeholder="Email">
        <input type="text" name="phone" placeholder="Phone">
        <input type="text" name="address" placeholder="Address">

        <select name="role" id="role" onchange="showFields()">
            <option value="user">Parking User</option>
            <option value="provider">Parking Provider</option>
        </select>

        <input type="password" name="password" placeholder="Password">

        <button type="submit">Register</button>
    </form>
</div>

<script>
function showFields() {
    var role = document.getElementById("role").value;
    var userFields = document.getElementById("userFields");
    var providerFields = document.getElementById("providerFields");

    if(userFields && providerFields){
        if(role === "user"){
            userFields.style.display = "block";
            providerFields.style.display = "none";
        }
        else if(role === "provider"){
            providerFields.style.display = "block";
            userFields.style.display = "none";
        }
        else{
            userFields.style.display = "none";
            providerFields.style.display = "none";
        }
    }
}
</script>

{% endblock %}
