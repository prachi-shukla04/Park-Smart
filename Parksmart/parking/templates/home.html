<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Park{% endblock %}</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #ec4899;
            --bg-dark: #0f172a;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-dark);
            color: var(--text-light);
            overflow-x: hidden;
        }

        /* DYNAMIC BACKGROUND */
        .bg-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            background: url('https://images.unsplash.com/photo-1590674899484-d5640e854abe?w=1920&q=80') center/cover no-repeat;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.9) 0%, rgba(15, 23, 42, 0.7) 50%, rgba(15, 23, 42, 0.95) 100%);
        }

        /* HEADER / NAVBAR */
        .header {
            position: sticky;
            top: 0;
            z-index: 1000;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }

        .header.scrolled {
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-decoration: none;
            color: var(--text-light);
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.02);
        }

        .logo-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
            font-size: 20px;
            color: white;
        }

        /* NAVIGATION LINKS */
        .nav {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 8px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-link:hover {
            color: var(--text-light);
            background: rgba(255, 255, 255, 0.05);
        }

        /* ACTION BUTTONS */
        .btn-action {
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #818cf8);
            color: white !important;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
        }

        .btn-logout {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444 !important;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-logout:hover {
            background: #ef4444;
            color: white !important;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }

        /* CONTENT CONTAINER */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* FOOTER */
        .footer {
            padding: 24px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--glass-border);
            margin-top: auto;
        }

        .footer strong {
            color: var(--primary);
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* RESPONSIVE DESIGN */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                height: auto;
                padding: 15px;
                gap: 15px;
            }
            .nav {
                flex-wrap: wrap;
                justify-content: center;
                gap: 10px;
            }
            .content {
                padding: 20px 10px;
            }
        }
    </style>
</head>
<body>

    <!-- BACKGROUND -->
    <div class="bg-wrapper"></div>
    <div class="bg-overlay"></div>

    <!-- HEADER -->
    <header class="header" id="navbar">
        <a href="/" class="logo">
            <div class="logo-icon"><i class="fa-solid fa-car"></i></div>
            SMART PARK
        </a>

        <nav class="nav">
            <a href="/" class="nav-link"><i class="fa-solid fa-house"></i> Home</a>

            {% if user.is_authenticated %}
                {% if request.session.role == 'provider' %}
                    <a href="{% url 'parking_provider' %}" class="btn-action btn-primary"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                {% elif request.session.role == 'user' %}
                    <a href="{% url 'user_dashboard' %}" class="btn-action btn-primary"><i class="fa-solid fa-user"></i> Dashboard</a>
                {% endif %}
                <a href="{% url 'logout' %}" class="btn-action btn-logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
            {% else %}
                <a href="/login" class="nav-link">Login</a>
                <a href="/register" class="btn-action btn-primary">Register</a>
            {% endif %}
        </nav>
    </header>

    <!-- MAIN CONTENT -->
    <main class="content">
        {% block content %}
        {% endblock %}
    </main>

    <!-- FOOTER -->
    <footer class="footer">
        © 2026 <strong>Smart Park</strong> — Modern Parking Solutions
    </footer>

    <!-- SCRIPTS -->
    <script>
        // Add shadow to navbar on scroll
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 10) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        });
    </script>

</body>
</html>
